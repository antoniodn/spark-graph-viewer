name: Automated Testing

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
    - uses: actions/checkout@v3
    
    - name: Configurar Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Rodar pytest
      run: |
        pytest -v --cov=app --cov-report=term-missing
    
    - name: Rodar testes unitários
      run: |
        pytest -m unit -v
    
    - name: Rodar testes de integração (sem Spark)
      run: |
        pytest -m "integration and not spark" -v
    
    - name: Gerar relatório de cobertura
      run: |
        pytest --cov=app --cov-report=xml --cov-report=term-missing
    
    - name: Upload cobertura para Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pylint black isort
        pip install -r requirements.txt
    
    - name: Verificar formatação com Black
      run: black --check app.py tests/
    
    - name: Verificar imports com isort
      run: isort --check-only app.py tests/
    
    - name: Lint com Flake8
      run: flake8 app.py tests/ --max-line-length=120 --ignore=E203,W503
