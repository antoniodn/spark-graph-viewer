[pytest]
# Pytest configuration for the Spark Graph Viewer project

# Tests directory
testpaths = tests

# Test file name pattern
python_files = test_*.py

# Test class name pattern
python_classes = Test*

# Test function name pattern
python_functions = test_*

# Default options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -p no:warnings

# Custom markers
markers =
    unit: unit tests for isolated functions
    integration: integration tests for components
    spark: tests that require a Spark connection
    slow: long-running tests
    smoke: quick sanity-check tests

# Coverage (test coverage)
# Uncomment to enable:
# --cov=app
# --cov-report=html
# --cov-report=term-missing
